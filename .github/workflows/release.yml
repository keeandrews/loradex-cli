name: release

# On every vX.Y.Z tag: build cross-platform binaries, publish a GitHub release,
# and update the Homebrew cask in keeandrews/homebrew-loradex.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Used to create the GitHub release on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with contents:write on keeandrews/homebrew-loradex (the tap).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
